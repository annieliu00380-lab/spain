<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>朝聖助手 Pro - 安全分享版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f6f8; }
        #map { height: 40vh; width: 100%; border-bottom: 2px solid #ddd; }
        
        /* 倒數計時板 */
        .countdown-banner { padding: 12px; text-align: center; font-weight: bold; }
        .silver-panel { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: #2c3e50; }
        .gold-panel { background: linear-gradient(135deg, #f1c40f, #d4af37); color: #5d4037; }
        
        .container { padding: 12px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 12px; }
        
        .day-selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .day-btn { flex: 1; padding: 10px 0; border-radius: 8px; border: 1px solid #1a508b; background: white; font-size: 12px; }
        .day-btn.active { background: #1a508b; color: white; }

        .share-box { display: flex; gap: 10px; margin-top: 10px; }
        .btn-share { flex: 1; background: #55acee; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-location { flex: 1; background: #9b59b6; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-item { background: #f8f9fa; padding: 8px; border-radius: 8px; text-align: center; font-size: 13px; }
        .stat-val { display: block; font-weight: bold; color: #1a508b; font-size: 16px; }

        #recording-label { color: #dc3545; font-size: 12px; text-align: center; margin-top: 5px; display: none; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="countdown-panel" class="countdown-banner silver-panel">
    <span id="dist-to-cathedral">載入中...</span><br>
    <small id="encouragement-text">¡Buen Camino!</small>
</div>

<div id="map"></div>

<div class="container">
    <div class="day-selector">
        <button class="day-btn active" onclick="switchDay(1)">Day 1</button>
        <button class="day-btn" onclick="switchDay(2)">Day 2</button>
        <button class="day-btn" onclick="switchDay(3)">Day 3</button>
        <button class="day-btn" onclick="switchDay(4)">Day 4</button>
    </div>

    <div class="card">
        <label style="font-size: 12px; color: #666;">📎 匯入今日 GPX 路徑</label>
        <input type="file" id="gpx-input" accept=".gpx" onchange="handleGpxUpload(this)" style="margin-top:5px; width:100%;">
        
        <div class="stat-grid">
            <div class="stat-item">今日距離<span class="stat-val" id="today-dist">0 km</span></div>
            <div class="stat-item">預計抵達<span class="stat-val" id="arrival-time">--:--</span></div>
        </div>
    </div>

    <!-- 安全回報區 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 10px; font-size: 14px;">🚩 安全回報與標記</div>
        <div class="share-box">
            <button class="btn-location" onclick="markLocation('休息/住宿')">📍 標記當前位置</button>
            <button class="btn-share" onclick="shareToFamily()">📤 傳送座標給家人</button>
        </div>
        <p style="font-size: 11px; color: #888; margin-top: 8px;">* 標記後會在地圖留下紫色點。點擊「傳送」可將座標連結發送至 LINE/WhatsApp。</p>
    </div>

    <div class="card">
        <button class="btn-share" style="background: #28a745;" onclick="startTracking()" id="start-btn">開始紀錄紅線</button>
        <button class="btn-share" style="background: #dc3545; display:none;" onclick="stopTracking()" id="stop-btn">停止紀錄</button>
        <div id="recording-label">● 正在繪製您的移動紅線...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    let map = L.map('map', { zoomControl: false }).setView([42.774, -8.443], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let dayData = { 1: {dist:0}, 2: {dist:0}, 3: {dist:0}, 4: {dist:0} };
    let currentDay = 1;
    let userMarker, watchId;
    let lastLat, lastLng;
    let liveTrackPoints = [];
    let liveTrackLayer = L.polyline([], {color: 'red', weight: 4, dashArray: '5, 8'}).addTo(map);

    function handleGpxUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            new L.GPX(e.target.result, { async: true, polyline_options: { color: '#1a508b' } })
            .on('loaded', ev => {
                dayData[currentDay].dist = parseFloat((ev.target.get_distance()/1000).toFixed(2));
                map.fitBounds(ev.target.getBounds());
                updateUI();
            }).addTo(map);
        };
        reader.readAsText(file);
    }

    function markLocation(type) {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude;
            const lng = p.coords.longitude;
            lastLat = lat; lastLng = lng;
            L.marker([lat, lng]).addTo(map)
                .bindPopup(`<b>${type}點</b><br>${new Date().toLocaleTimeString()}`).openPopup();
            alert(`已在地圖標記：${type}`);
        });
    }

    function shareToFamily() {
        if (!lastLat) {
            alert("請先點擊『標記當前位置』獲取座標");
            return;
        }
        const text = encodeURIComponent(`家人您好，我現在在朝聖之路上！\n目前的座標位置是：\nhttps://www.google.com/maps?q=${lastLat},${lastLng}\n一切平安！`);
        window.open(`https://api.whatsapp.com/send?text=${text}`);
        // 如果想改用 LINE，可以使用： window.open(`https://line.me/R/msg/text/?${text}`);
    }

    function updateUI() {
        document.getElementById('today-dist').innerText = `${dayData[currentDay].dist} km`;
        let total = 0;
        for (let i = currentDay; i <= 4; i++) total += dayData[i].dist;
        
        const panel = document.getElementById('countdown-panel');
        if (currentDay == 4) {
            panel.className = "countdown-banner gold-panel";
            document.getElementById('dist-to-cathedral').innerText = `最後抵達里程！`;
            document.getElementById('encouragement-text').innerText = "¡Santiago te espera!";
        } else {
            panel.className = "countdown-banner silver-panel";
            document.getElementById('dist-to-cathedral').innerText = `距大教堂剩餘約 ${total.toFixed(1)} km`;
        }
    }

    function startTracking() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        document.getElementById('recording-label').style.display = 'block';
        watchId = navigator.geolocation.watchPosition(p => {
            const ll = [p.coords.latitude, p.coords.longitude];
            lastLat = ll[0]; lastLng = ll[1];
            liveTrackPoints.push(ll);
            liveTrackLayer.setLatLngs(liveTrackPoints);
            if (userMarker) userMarker.setLatLng(ll);
            else userMarker = L.circleMarker(ll, {radius: 8, fillColor: 'blue', color: 'white'}).addTo(map);
            map.panTo(ll);
        }, null, { enableHighAccuracy: true });
    }

    function stopTracking() {
        navigator.geolocation.clearWatch(watchId);
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('recording-label').style.display = 'none';
    }

    function switchDay(day) {
        currentDay = day;
        document.querySelectorAll('.day-btn').forEach((b, i) => b.className = (i+1 === day ? 'day-btn active' : 'day-btn'));
        updateUI();
    }
</script>
</body>
</html>
